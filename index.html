<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI UC REWARD CENTER</title>
    <style>
        body { background: #0b1320; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #fbbf24; border-radius: 15px; padding: 25px; max-width: 400px; margin: auto; background: #161d2b; }
        h1 { color: #fbbf24; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        .btn { background: #fbbf24; color: black; padding: 15px; border: none; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://www.battlegroundsmobileindia.com/common/img/main/logo.png" width="120">
        <h1>FREE UC GIFT</h1>
        <p>Enter Character ID to receive 2000 UC</p>
        <input type="number" id="id" placeholder="Character ID...">
        <button class="btn" onclick="prank()">CLAIM NOW</button>
        <p id="msg" style="margin-top:15px; color: #22c55e;"></p>
    </div>
    <script>
        function prank() {
            var val = document.getElementById('id').value;
            if(!val) { alert("ID toh daal de bhai!"); return; }
            document.getElementById('msg').innerText = "Verifying ID...";
            setTimeout(() => { document.getElementById('msg').innerText = "Injecting UC..."; }, 2000);
            setTimeout(() => { 
                alert("Oye! Tera Kaat Diya Gaya Hai! 😂\n\nKoi free UC nahi milti aise, padhai karle!"); 
                document.getElementById('msg').innerText = "Prank Done! 💀";
            }, 4000);
        }
    </script>
</body>
</html>
